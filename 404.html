<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Gabriel's Portfolio</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/FavIcon/Gabtrex.png"/>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        .not-found {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .not-found-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 60%, rgba(255,255,255,0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .not-found-code {
            font-family: 'Playfair Display', serif;
            font-size: clamp(7rem, 20vw, 14rem);
            font-weight: 600;
            color: #fff;
            line-height: 1;
            margin: 0;
            letter-spacing: -4px;
            opacity: 0;
            transform: translateY(30px);
            animation: nfFadeUp 0.7s 0.1s forwards;
            /* Subtle gradient on the number */
            background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.35) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .not-found-title {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin: 0.5rem 0 2.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: nfFadeUp 0.6s 0.28s forwards;
        }

        .not-found-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.25), transparent);
            margin: 0 auto 2.5rem;
            opacity: 0;
            animation: nfFadeUp 0.6s 0.42s forwards;
        }

        .not-found-msg {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            max-width: 340px;
            line-height: 1.8;
            margin: 0 0 3rem;
            opacity: 0;
            transform: translateY(16px);
            animation: nfFadeUp 0.6s 0.5s forwards;
        }

        .not-found-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 13px 36px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
            opacity: 0;
            transform: translateY(14px);
            animation: nfFadeUp 0.6s 0.62s forwards;
            cursor: none;
        }

        .not-found-btn:hover {
            background: rgba(255,255,255,0.18);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(255,255,255,0.08);
        }

        @keyframes nfFadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header></header>

<div class="not-found">
    <div class="not-found-bg"></div>
    <p class="not-found-code">404</p>
    <p class="not-found-title">Page not found</p>
    <div class="not-found-line"></div>
    <p class="not-found-msg">This page doesn't exist or may have been moved. Head back and explore my work instead !</p>
    <a class="not-found-btn" href="index.html">Back to Portfolio</a>
</div>

<script src="header.js"></script>
<script src="cursor.js"></script>

</body>
</html>
